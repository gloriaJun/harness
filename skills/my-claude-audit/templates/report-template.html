<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Code Configuration Audit</title>
    <style>
      :root {
        --bg-primary: #1a1a2e;
        --bg-card: #16213e;
        --bg-card-hover: #1a2745;
        --bg-input: #0f1a30;
        --text-primary: #e0e0e0;
        --text-secondary: #a0a0b0;
        --text-muted: #707088;
        --accent: #0f3460;
        --accent-light: #1a4a80;
        --border: #2a2a4a;
        --green: #4caf50;
        --green-bg: rgba(76, 175, 80, 0.12);
        --yellow: #ff9800;
        --yellow-bg: rgba(255, 152, 0, 0.12);
        --red: #f44336;
        --red-bg: rgba(244, 67, 54, 0.12);
        --blue: #2196f3;
        --blue-bg: rgba(33, 150, 243, 0.12);
        --purple: #9c27b0;
        --purple-bg: rgba(156, 39, 176, 0.12);
        --cyan: #00bcd4;
        --teal: #009688;
        --radius: 8px;
        --radius-lg: 12px;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        --transition: 0.2s ease;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.6;
        min-height: 100vh;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px;
      }

      /* Header */
      .header {
        text-align: center;
        margin-bottom: 32px;
      }
      .header h1 {
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .header .subtitle {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }
      .scope-badge {
        display: inline-block;
        padding: 2px 12px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        background: var(--accent);
        color: var(--blue);
        margin-top: 8px;
      }
      .analyzer-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-left: 8px;
        vertical-align: middle;
      }
      .analyzer-badge.gemini { background: rgba(66, 133, 244, 0.2); color: #4285f4; }
      .analyzer-badge.openai { background: rgba(16, 163, 127, 0.2); color: #10a37f; }
      .analyzer-badge.codex { background: rgba(16, 163, 127, 0.2); color: #10a37f; }
      .analyzer-badge.claude-code { background: rgba(204, 120, 50, 0.2); color: #cc7832; }
      .analyzer-badge.custom { background: rgba(156, 39, 176, 0.2); color: #9c27b0; }

      /* Language toggle */
      .lang-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        display: flex;
        gap: 0;
        overflow: hidden;
        z-index: 100;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .lang-toggle button {
        background: none;
        border: none;
        color: var(--text-muted);
        padding: 5px 12px;
        cursor: pointer;
        transition: all var(--transition);
      }
      .lang-toggle button.active {
        background: var(--blue);
        color: #fff;
      }
      .lang-toggle button:hover:not(.active) {
        color: var(--text-primary);
      }

      /* Dashboard grid */
      .dashboard {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 24px;
        margin-bottom: 32px;
      }
      @media (max-width: 768px) {
        .dashboard {
          grid-template-columns: 1fr;
        }
      }

      /* Score gauge */
      .gauge-container {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 24px;
        text-align: center;
        box-shadow: var(--shadow);
      }
      .gauge-container h3 {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .gauge-label {
        font-size: 1rem;
        font-weight: 600;
        margin-top: 8px;
      }

      /* Radar + stats panel */
      .stats-panel {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .radar-wrap {
        display: flex;
        justify-content: center;
      }
      .summary-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px;
      }
      .stat-box {
        background: var(--bg-input);
        border-radius: var(--radius);
        padding: 12px;
        text-align: center;
      }
      .stat-box .stat-value {
        font-size: 1.5rem;
        font-weight: 700;
      }
      .stat-box .stat-label {
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin-top: 2px;
      }

      /* Tabs */
      .tab-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        padding-bottom: 4px;
        border-bottom: 2px solid var(--border);
        margin-bottom: 24px;
      }
      .tab-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        padding: 8px 14px;
        cursor: pointer;
        font-size: 0.82rem;
        font-weight: 500;
        white-space: nowrap;
        border-radius: var(--radius) var(--radius) 0 0;
        transition:
          background var(--transition),
          color var(--transition);
      }
      .tab-btn:hover {
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .tab-btn.active {
        background: var(--bg-card);
        color: var(--blue);
        border-bottom: 2px solid var(--blue);
        margin-bottom: -2px;
      }
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }

      /* Cards */
      .card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
        transition: background var(--transition);
      }
      .card:hover {
        background: var(--bg-card-hover);
      }
      .card h3 {
        font-size: 1rem;
        margin-bottom: 8px;
      }
      .card p {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      /* Severity badges */
      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 10px;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
      }
      .badge-critical {
        background: var(--red-bg);
        color: var(--red);
      }
      .badge-warning {
        background: var(--yellow-bg);
        color: var(--yellow);
      }
      .badge-info {
        background: var(--blue-bg);
        color: var(--blue);
      }
      .badge-good {
        background: var(--green-bg);
        color: var(--green);
      }

      /* Effort badges */
      .effort {
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 8px;
        font-weight: 600;
      }
      .effort-easy {
        background: var(--green-bg);
        color: var(--green);
      }
      .effort-medium {
        background: var(--yellow-bg);
        color: var(--yellow);
      }
      .effort-hard {
        background: var(--red-bg);
        color: var(--red);
      }

      /* Tables */
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      th,
      td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      th {
        color: var(--text-secondary);
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      th:hover {
        color: var(--text-primary);
      }
      th .sort-arrow {
        margin-left: 4px;
        font-size: 0.65rem;
      }
      tr:hover td {
        background: var(--bg-input);
      }

      /* Skill grid */
      .skill-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
      }
      .skill-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 16px;
        border-left: 3px solid var(--accent);
        box-shadow: var(--shadow);
        transition: background var(--transition);
      }
      .skill-card:hover {
        background: var(--bg-card-hover);
      }
      .skill-card .skill-name {
        font-weight: 600;
        font-size: 0.95rem;
      }
      .skill-card .skill-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
        flex-wrap: wrap;
      }
      .marketplace-badge {
        font-size: 0.65rem;
        padding: 2px 8px;
        border-radius: 8px;
        background: var(--accent);
        color: var(--cyan);
        font-weight: 500;
      }
      .cso-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
      }
      .cso-good {
        background: var(--green);
      }
      .cso-warning {
        background: var(--yellow);
      }
      .cso-bad {
        background: var(--red);
      }
      .overlap-icon {
        color: var(--yellow);
        font-size: 0.8rem;
      }
      .enabled-badge {
        font-size: 0.65rem;
        color: var(--green);
      }
      .disabled-badge {
        font-size: 0.65rem;
        color: var(--red);
      }

      /* Checklist */
      .checklist-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .checklist-icon {
        font-size: 1.1rem;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .checklist-content {
        flex: 1;
      }
      .checklist-content h4 {
        font-size: 0.9rem;
        margin-bottom: 2px;
      }
      .checklist-content p {
        font-size: 0.8rem;
        color: var(--text-secondary);
      }

      /* Collapsible */
      .collapsible-header {
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .collapsible-header .arrow {
        transition: transform var(--transition);
        font-size: 0.8rem;
        color: var(--text-muted);
      }
      .collapsible-header.open .arrow {
        transform: rotate(90deg);
      }
      .collapsible-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .collapsible-body.open {
        max-height: 500px;
      }
      .collapsible-body-inner {
        padding-top: 12px;
      }

      /* Code */
      code,
      .mono {
        font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        background: var(--bg-input);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.8rem;
        color: var(--cyan);
      }
      .fix-cmd {
        display: block;
        margin-top: 8px;
        padding: 8px 12px;
        background: var(--bg-input);
        border-radius: var(--radius);
        font-family: monospace;
        font-size: 0.8rem;
        color: var(--cyan);
        border-left: 3px solid var(--accent-light);
      }

      /* Filter chips */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      .chip {
        padding: 4px 14px;
        border-radius: 16px;
        font-size: 0.75rem;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--bg-input);
        color: var(--text-secondary);
        font-weight: 500;
        transition: all var(--transition);
      }
      .chip:hover {
        border-color: var(--blue);
        color: var(--blue);
      }
      .chip.active {
        background: var(--blue);
        color: #fff;
        border-color: var(--blue);
      }

      /* Two-column automation */
      .auto-card {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 20px;
        margin-bottom: 12px;
        box-shadow: var(--shadow);
      }
      @media (max-width: 768px) {
        .auto-card {
          grid-template-columns: 1fr;
        }
      }
      .auto-col h4 {
        font-size: 0.75rem;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }
      .auto-col p {
        font-size: 0.875rem;
      }

      /* Recommended command cards */
      .cmd-card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 20px;
        margin-bottom: 12px;
        box-shadow: var(--shadow);
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }
      .cmd-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
      }
      .cmd-body {
        flex: 1;
      }
      .cmd-body h4 {
        font-size: 0.95rem;
        margin-bottom: 4px;
      }
      .cmd-body .cmd-desc {
        color: var(--text-secondary);
        font-size: 0.85rem;
        margin-bottom: 4px;
      }
      .cmd-body .cmd-benefit {
        color: var(--green);
        font-size: 0.8rem;
      }

      /* Charts */
      .chart-section {
        margin-bottom: 24px;
      }
      .chart-section h3 {
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .chart-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        margin-bottom: 24px;
      }
      @media (max-width: 768px) {
        .chart-row {
          grid-template-columns: 1fr;
        }
      }
      .chart-box {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 20px;
        box-shadow: var(--shadow);
      }

      /* Bonuses/deductions */
      .score-detail {
        margin-top: 12px;
      }
      .score-detail-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 0;
        font-size: 0.8rem;
      }
      .score-detail-item .reason {
        color: var(--text-secondary);
      }
      .score-detail-item .points-pos {
        color: var(--green);
        font-weight: 600;
      }
      .score-detail-item .points-neg {
        color: var(--red);
        font-weight: 600;
      }

      /* Footer */
      .footer {
        text-align: center;
        padding: 24px 0;
        margin-top: 32px;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      /* SVG text */
      svg text {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .patch-code {
        position: relative;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 48px 12px 12px;
        font-family: monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        background: var(--accent);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text-secondary);
        padding: 4px 8px;
        cursor: pointer;
        font-size: 0.75rem;
      }
      .copy-btn:hover { background: var(--accent-light); }
      .copy-btn.copied { color: var(--green); }

      /* Section headings within tabs */
      .section-heading {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .subsection {
        margin-bottom: 24px;
      }
    </style>
  </head>

      let currentLang = navigator.language.startsWith("ko") ? "ko" : "en";

      function t(key) {
        return i18n[currentLang][key] || i18n["en"][key] || key;
      }

      function setLang(lang) {
        currentLang = lang;
        document.documentElement.lang = lang;
        document
          .getElementById("lang-en")
          .classList.toggle("active", lang === "en");
        document
          .getElementById("lang-ko")
          .classList.toggle("active", lang === "ko");
        render();
      }
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("lang-" + currentLang).classList.add("active");
      });

      // ── Utility functions ──
      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      const TAG_LABELS = {
        en: {
          TAG_CTX_HOARD: "Context Bloat",
          TAG_BLIND_FOLLOW: "Unverified Code",
          TAG_SILENT_FIX: "Vague Fix Request",
          TAG_ERR_DUMP: "Log Bomb",
          TAG_ONESHOT_WAR: "Multi-File Blast",
        },
        ko: {
          TAG_CTX_HOARD: "컨텍스트 비대화",
          TAG_BLIND_FOLLOW: "무검증 코드 수용",
          TAG_SILENT_FIX: "모호한 수정 요청",
          TAG_ERR_DUMP: "로그 폭탄",
          TAG_ONESHOT_WAR: "다중 파일 동시 수정",
        },
      };
      function tagLabel(tag) {
        return (TAG_LABELS[currentLang] && TAG_LABELS[currentLang][tag]) || tag;
      }
      function shortFile(f) {
        return f.replace(/.*\//, "");
      }
      function scoreColor(s) {
        if (s >= 85) return "var(--green)";
        if (s >= 70) return "var(--blue)";
        if (s >= 50) return "var(--yellow)";
        return "var(--red)";
      }
      function scoreLabel(s) {
        if (s >= 85) return t("excellent");
        if (s >= 70) return t("good");
        if (s >= 50) return t("fair");
        return t("needsAttention");
      }
      function sevClass(s) {
        if (s === "critical") return "badge-critical";
        if (s === "warning") return "badge-warning";
        return "badge-info";
      }
      function effortClass(e) {
        if (e === "easy") return "effort-easy";
        if (e === "medium") return "effort-medium";
        return "effort-hard";
      }
      function sevOrder(s) {
        return s === "critical" ? 0 : s === "warning" ? 1 : 2;
      }

      const mpColors = {
        "superpowers-marketplace": "#9c27b0",
        "team-marketplace": "#2196f3",
        "webdev-marketplace": "#009688",
        personal: "#ff9800",
      };
      function mpColor(mp) {
        return mpColors[mp] || "var(--accent)";
      }

      // ── SVG builders ──
      function buildGauge(score, size) {
        size = size || 180;
        const cx = size / 2,
          cy = size / 2,
          r = size / 2 - 16;
        const circ = 2 * Math.PI * r;
        const offset = circ - (score / 100) * circ;
        const color = scoreColor(score);
        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="10"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"
      style="transition: stroke-dashoffset 0.8s ease"/>
    <text x="${cx}" y="${cy - 8}" text-anchor="middle" fill="${color}" font-size="36" font-weight="700">${score}</text>
    <text x="${cx}" y="${cy + 16}" text-anchor="middle" fill="var(--text-secondary)" font-size="13">${scoreLabel(score)}</text>
  </svg>`;
      }

      function buildRadar(breakdown, size) {
        size = size || 300;
        const pad = 60;
        const full = size + pad * 2;
        const cx = full / 2,
          cy = full / 2,
          r = size / 2 - 20;
        const dims = Object.keys(breakdown);
        const n = dims.length;
        const labels = {
          tokenEfficiency: t("dimTokenEff"),
          configHealth: t("dimConfig"),
          ecosystemHealth: t("dimEcosystem"),
          featureUtilization: t("dimFeatures"),
          automationLevel: t("dimAutomation"),
          crossLayerHarmony: t("dimHarmony"),
          agentDelegation: t("dimAgent"),
        };

        function polar(i, val) {
          const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
          const dist = (val / 100) * r;
          return {
            x: cx + dist * Math.cos(angle),
            y: cy + dist * Math.sin(angle),
          };
        }

        let svg = `<svg width="${full}" height="${full}" viewBox="0 0 ${full} ${full}">`;

        // Grid rings
        for (let ring = 20; ring <= 100; ring += 20) {
          let pts = [];
          for (let i = 0; i < n; i++) {
            const p = polar(i, ring);
            pts.push(`${p.x},${p.y}`);
          }
          svg += `<polygon points="${pts.join(" ")}" fill="none" stroke="var(--border)" stroke-width="0.5"/>`;
        }

        // Axis lines
        for (let i = 0; i < n; i++) {
          const p = polar(i, 100);
          svg += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="var(--border)" stroke-width="0.5"/>`;
        }

        // Data polygon
        let dataPts = [];
        for (let i = 0; i < n; i++) {
          const p = polar(i, breakdown[dims[i]]);
          dataPts.push(`${p.x},${p.y}`);
        }
        svg += `<polygon points="${dataPts.join(" ")}" fill="rgba(33,150,243,0.15)" stroke="var(--blue)" stroke-width="2"/>`;

        // Dots + labels
        for (let i = 0; i < n; i++) {
          const p = polar(i, breakdown[dims[i]]);
          svg += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--blue)"/>`;
          const lp = polar(i, 125);
          const anchor =
            lp.x < cx - 10 ? "end" : lp.x > cx + 10 ? "start" : "middle";
          svg += `<text x="${lp.x}" y="${lp.y + 4}" text-anchor="${anchor}" fill="var(--text-secondary)" font-size="11">${labels[dims[i]] || dims[i]}</text>`;
          // Value
          const vp = polar(
            i,
            breakdown[dims[i]] + (breakdown[dims[i]] > 80 ? -12 : 12),
          );
          svg += `<text x="${vp.x}" y="${vp.y + 4}" text-anchor="middle" fill="var(--text-primary)" font-size="9" font-weight="600">${breakdown[dims[i]]}</text>`;
        }

        svg += "</svg>";
        return svg;
      }

      function buildBarChart(globalFiles, projectFiles) {
        const all = [
          ...globalFiles.map((f) => ({ ...f, layer: "global" })),
          ...projectFiles.map((f) => ({ ...f, layer: "project" })),
        ];
        const maxTokens = Math.max(
          ...all.map((f) => f.tokens + (f.transitiveTokens || 0)),
          1,
        );
        const barH = 24,
          gap = 4,
          labelW = 180,
          chartW = 500,
          padR = 60;
        const totalH = all.length * (barH + gap) + 60;

        function barColor(tokens) {
          if (tokens > 5000) return "var(--red)";
          if (tokens > 1000) return "var(--yellow)";
          return "var(--green)";
        }

        let svg = `<svg width="100%" viewBox="0 0 ${labelW + chartW + padR} ${totalH}" style="max-width:100%">`;
        let y = 10;
        let lastLayer = "";

        all.forEach((f) => {
          if (f.layer !== lastLayer) {
            svg += `<text x="0" y="${y + 14}" fill="var(--text-muted)" font-size="11" font-weight="600">${f.layer.toUpperCase()}</text>`;
            y += 22;
            lastLayer = f.layer;
          }
          const name = shortFile(f.file);
          const w = (f.tokens / maxTokens) * chartW;
          const tw = f.transitiveTokens
            ? (f.transitiveTokens / maxTokens) * chartW
            : 0;

          svg += `<text x="10" y="${y + 16}" fill="var(--text-secondary)" font-size="10">${esc(name)}</text>`;
          svg += `<rect x="${labelW}" y="${y + 2}" width="${w}" height="${barH - 4}" rx="3" fill="${barColor(f.tokens)}" opacity="0.85"/>`;
          if (tw > 0) {
            svg += `<rect x="${labelW + w}" y="${y + 2}" width="${tw}" height="${barH - 4}" rx="0 3 3 0" fill="${barColor(f.tokens + f.transitiveTokens)}" opacity="0.4"/>`;
          }
          const totalTk = f.tokens + (f.transitiveTokens || 0);
          svg += `<text x="${labelW + w + tw + 4}" y="${y + 16}" fill="var(--text-secondary)" font-size="9">${totalTk.toLocaleString()}</text>`;
          y += barH + gap;
        });

        // Legend
        y += 10;
        svg += `<rect x="${labelW}" y="${y}" width="12" height="12" rx="2" fill="var(--green)"/>`;
        svg += `<text x="${labelW + 16}" y="${y + 10}" fill="var(--text-muted)" font-size="9">&lt;1K</text>`;
        svg += `<rect x="${labelW + 55}" y="${y}" width="12" height="12" rx="2" fill="var(--yellow)"/>`;
        svg += `<text x="${labelW + 71}" y="${y + 10}" fill="var(--text-muted)" font-size="9">1-5K</text>`;
        svg += `<rect x="${labelW + 112}" y="${y}" width="12" height="12" rx="2" fill="var(--red)"/>`;
        svg += `<text x="${labelW + 128}" y="${y + 10}" fill="var(--text-muted)" font-size="9">&gt;5K</text>`;
        svg += `<rect x="${labelW + 165}" y="${y}" width="12" height="12" rx="2" fill="var(--yellow)" opacity="0.4"/>`;
        svg += `<text x="${labelW + 181}" y="${y + 10}" fill="var(--text-muted)" font-size="9">@refs</text>`;

        svg += "</svg>";
        return svg;
      }

      function buildPieChart(size) {
        size = size || 220;
        const m = data.tokenAndConfig.metrics;
        const total = 200000; // ~200K context
        const slices = [
          {
            label: "Global Config",
            value: m.globalTotalTokens,
            color: "var(--blue)",
          },
          {
            label: "Project Config",
            value: m.projectTotalTokens,
            color: "var(--purple)",
          },
          {
            label: "Skill Descriptions",
            value: data.skillsEcosystem.metrics.totalDescriptionTokens,
            color: "var(--teal)",
          },
          {
            label: "Available",
            value:
              total -
              m.globalTotalTokens -
              m.projectTotalTokens -
              data.skillsEcosystem.metrics.totalDescriptionTokens,
            color: "var(--border)",
          },
        ];
        const cx = size / 2,
          cy = size / 2,
          r = size / 2 - 30;
        let svg = `<svg width="${size}" height="${size + 100}" viewBox="0 0 ${size} ${size + 100}">`;
        let cumAngle = -Math.PI / 2;

        slices.forEach((s) => {
          const angle = (s.value / total) * 2 * Math.PI;
          const x1 = cx + r * Math.cos(cumAngle);
          const y1 = cy + r * Math.sin(cumAngle);
          cumAngle += angle;
          const x2 = cx + r * Math.cos(cumAngle);
          const y2 = cy + r * Math.sin(cumAngle);
          const large = angle > Math.PI ? 1 : 0;
          svg += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${s.color}" opacity="0.8"/>`;
        });

        // Center text
        const usedPct = (
          ((m.globalTotalTokens +
            m.projectTotalTokens +
            data.skillsEcosystem.metrics.totalDescriptionTokens) /
            total) *
          100
        ).toFixed(1);
        svg += `<text x="${cx}" y="${cy - 4}" text-anchor="middle" fill="var(--text-primary)" font-size="16" font-weight="700">${usedPct}%</text>`;
        svg += `<text x="${cx}" y="${cy + 12}" text-anchor="middle" fill="var(--text-muted)" font-size="9">${t("used")}</text>`;

        // Legend
        let ly = size + 4;
        slices.forEach((s, i) => {
          const lx = i < 2 ? 10 : size / 2 + 10;
          const lly = i % 2 === 0 ? ly : ly + 16;
          if (i === 2) ly = size + 4;
          const row = Math.floor(i / 2);
          const col = i % 2;
          const px = col * (size / 2) + 10;
          const py = size + 12 + row * 24;
          svg += `<rect x="${px}" y="${py}" width="10" height="10" rx="2" fill="${s.color}" opacity="0.8"/>`;
          svg += `<text x="${px + 14}" y="${py + 9}" fill="var(--text-muted)" font-size="9">${s.label} (${s.value.toLocaleString()})</text>`;
        });

        svg += "</svg>";
        return svg;
      }

      function buildMiniBar(dist) {
        const entries = Object.entries(dist).sort((a, b) => b[1] - a[1]);
        const maxVal = Math.max(...entries.map((e) => e[1]));
        const barH = 22,
          gap = 6,
          w = 300;
        const totalH = entries.length * (barH + gap) + 4;
        let svg = `<svg width="100%" viewBox="0 0 ${w} ${totalH}" style="max-width:${w}px">`;
        let y = 2;
        entries.forEach(([mp, count]) => {
          const bw = (count / maxVal) * (w - 120);
          svg += `<text x="0" y="${y + 15}" fill="var(--text-secondary)" font-size="10">${esc(mp.replace("-marketplace", ""))}</text>`;
          svg += `<rect x="120" y="${y + 2}" width="${bw}" height="${barH - 4}" rx="3" fill="${mpColor(mp)}" opacity="0.7"/>`;
          svg += `<text x="${122 + bw + 4}" y="${y + 15}" fill="var(--text-muted)" font-size="10">${count}</text>`;
          y += barH + gap;
        });
        svg += "</svg>";
        return svg;
      }

      // ── Counting helpers ──
      function countFindings(sev) {
        let c = 0;
        [data.tokenAndConfig, data.skillsEcosystem, data.insights].forEach(
          (section) => {
            if (section.findings)
              c += section.findings.filter((f) => f.severity === sev).length;
          },
        );
        return c;
      }
      function totalFilesScanned() {
        return (
          (data.tokenAndConfig.tokenBreakdown.global.length || 0) +
          (data.tokenAndConfig.tokenBreakdown.project.length || 0)
        );
      }

      // ── Table sorting ──
      let sortState = {};
      function sortTable(tableId, colIdx, type) {
        const table = document.getElementById(tableId);
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr"));
        const key = tableId + "-" + colIdx;
        sortState[key] = sortState[key] === "asc" ? "desc" : "asc";
        const dir = sortState[key] === "asc" ? 1 : -1;

        rows.sort((a, b) => {
          let av =
            a.cells[colIdx].getAttribute("data-val") ||
            a.cells[colIdx].textContent;
          let bv =
            b.cells[colIdx].getAttribute("data-val") ||
            b.cells[colIdx].textContent;
          if (type === "num") {
            av = parseFloat(av) || 0;
            bv = parseFloat(bv) || 0;
          }
          if (av < bv) return -dir;
          if (av > bv) return dir;
          return 0;
        });

        rows.forEach((r) => tbody.appendChild(r));

        // Update arrow indicators
        table
          .querySelectorAll("th .sort-arrow")
          .forEach((a) => (a.textContent = ""));
        const th = table.querySelectorAll("th")[colIdx];
        const arrow = th.querySelector(".sort-arrow");
        if (arrow) arrow.textContent = sortState[key] === "asc" ? " ▲" : " ▼";
      }

      // ── Collapsible toggle ──
      function toggleCollapse(id) {
        const body = document.getElementById(id);
        const header = body.previousElementSibling;
        body.classList.toggle("open");
        header.classList.toggle("open");
      }

      // ── Tab navigation ──

          .querySelectorAll(".tab-btn")

          .querySelectorAll(".tab-panel")

        document.querySelector(`[data-tab="${tabId}"]`).classList.add("active");
        document.getElementById(tabId).classList.add("active");
      }

      // ── Filter state ──
      let activeFilters = { severity: null, category: null };

  `,

    <!-- Footer -->
    <div class="footer">
      ${t("scannedAt")} ${new Date(data.meta.timestamp).toLocaleString()} | ${t("scope")}: ${esc(data.meta.scope)} | ${t("score")}: ${score.total}/100 | v${esc(data.meta.version)}
    </div>
  `;

        // Initial render of recommendations
        renderRecommendations();
      }

      function copyPatch(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
          const original = btn.textContent;
          btn.textContent = t("copied");
          btn.classList.add("copied");
          setTimeout(() => { btn.textContent = original; btn.classList.remove("copied"); }, 2000);
        });
      }

      // Boot
      render();
    </script>
  </body>
</html>
